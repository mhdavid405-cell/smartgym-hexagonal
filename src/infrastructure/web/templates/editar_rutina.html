{% extends "base.html" %}

{% block title %}Editar Rutina - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-edit text-primary me-3"></i>Editar Rutina</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h5 class="mb-0" id="rutinaTitulo">Cargando...</h5>
            </div>
            <div class="card-body">
                <div class="text-center mb-4" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-2">Cargando datos de la rutina...</p>
                </div>

                <form id="formEditarRutina" style="display: none;">
                    <input type="hidden" id="rutinaId">
                    
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label">Cliente</label>
                        <select class="form-select" id="cliente_id" required>
                            <option value="">Seleccionar cliente...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título de la Rutina</label>
                        <input type="text" class="form-control" id="titulo" required>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="ejercicios" class="form-label">Ejercicios</label>
                        <textarea class="form-control" id="ejercicios" rows="5" required placeholder="Press banca 3x12
Sentadillas 4x10
Dominadas 3x8"></textarea>
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="activa">
                            <label class="form-check-label" for="activa">
                                Rutina activa
                            </label>
                        </div>
                    </div>

                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    <div class="alert alert-success d-none" id="successAlert"></div>

                    <div class="d-flex justify-content-between">
                        <a href="/rutinas" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-warning" id="btnGuardar">
                            <i class="fas fa-save me-2"></i>Guardar Cambios
                        </button>
                    </div>
                </form>

                <div id="errorInfo" class="alert alert-danger d-none">
                    No se pudo cargar la información de la rutina
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const rutinaId = window.location.pathname.split('/')[2];

    // Cargar clientes para el select
    fetch('/api/clientes')
        .then(response => response.json())
        .then(clientes => {
            const select = document.getElementById('cliente_id');
            clientes.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.nombre} ${c.apellido} - ${c.dni}`;
                select.appendChild(option);
            });
        });

    document.addEventListener('DOMContentLoaded', function() {
        cargarRutina();
    });

    function cargarRutina() {
        fetch(`/api/rutinas/${rutinaId}`)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Rutina no encontrada');
                }
                return response.json();
            })
            .then(rutina => {
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('formEditarRutina').style.display = 'block';
                
                document.getElementById('rutinaTitulo').textContent = `Editando: ${rutina.titulo}`;
                document.getElementById('rutinaId').value = rutina.id;
                document.getElementById('cliente_id').value = rutina.cliente_id;
                document.getElementById('titulo').value = rutina.titulo;
                document.getElementById('descripcion').value = rutina.descripcion || '';
                document.getElementById('ejercicios').value = rutina.ejercicios;
                document.getElementById('activa').checked = rutina.activa;
            })
            .catch(error => {
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('errorInfo').classList.remove('d-none');
                document.getElementById('errorInfo').textContent = error.message;
                console.error('Error:', error);
            });
    }

    document.getElementById('formEditarRutina').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        const data = {
            cliente_id: parseInt(document.getElementById('cliente_id').value),
            titulo: document.getElementById('titulo').value,
            descripcion: document.getElementById('descripcion').value,
            ejercicios: document.getElementById('ejercicios').value,
            activa: document.getElementById('activa').checked
        };

        try {
            const response = await fetch(`/api/rutinas/${rutinaId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                document.getElementById('successAlert').classList.remove('d-none');
                document.getElementById('successAlert').textContent = 'Rutina actualizada exitosamente';
                setTimeout(() => window.location.href = `/rutinas/${rutinaId}`, 2000);
            } else {
                document.getElementById('errorAlert').classList.remove('d-none');
                document.getElementById('errorAlert').textContent = result.error;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cambios';
            }
        } catch (error) {
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('errorAlert').textContent = 'Error de conexión';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cambios';
            console.error('Error:', error);
        }
    });
</script>
{% endblock %}
