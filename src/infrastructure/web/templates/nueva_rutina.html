{% extends "base.html" %}

{% block title %}Nueva Rutina - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-plus-circle text-primary me-3"></i>Asignar Nueva Rutina</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Datos de la Rutina</h5>
            </div>
            <div class="card-body">
                <form id="formRutina">
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label">Cliente</label>
                        <select class="form-select" id="cliente_id" required>
                            <option value="">Seleccionar cliente...</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label for="titulo" class="form-label">Título de la Rutina</label>
                        <input type="text" class="form-control" id="titulo" required>
                    </div>

                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea class="form-control" id="descripcion" rows="2"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="ejercicios" class="form-label">Ejercicios (uno por línea)</label>
                        <textarea class="form-control" id="ejercicios" rows="5" required 
                            placeholder="Press banca 3x12
Sentadillas 4x10
Dominadas 3x8"></textarea>
                        <small class="text-muted">Formato: Ejercicio series x repeticiones</small>
                    </div>

                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    <div class="alert alert-success d-none" id="successAlert"></div>

                    <div class="d-flex justify-content-between">
                        <a href="/rutinas" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-2"></i>Guardar Rutina
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Cargar clientes al iniciar
    fetch('/api/clientes')
        .then(response => response.json())
        .then(clientes => {
            const select = document.getElementById('cliente_id');
            clientes.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.nombre} ${c.apellido} - ${c.dni}`;
                select.appendChild(option);
            });
        });

    document.getElementById('formRutina').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        const data = {
            cliente_id: document.getElementById('cliente_id').value,
            titulo: document.getElementById('titulo').value,
            descripcion: document.getElementById('descripcion').value,
            ejercicios: document.getElementById('ejercicios').value
        };

        try {
            const response = await fetch('/api/rutinas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                document.getElementById('successAlert').classList.remove('d-none');
                document.getElementById('successAlert').textContent = 'Rutina asignada exitosamente';
                setTimeout(() => window.location.href = '/rutinas', 2000);
            } else {
                document.getElementById('errorAlert').classList.remove('d-none');
                document.getElementById('errorAlert').textContent = result.error;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Rutina';
            }
        } catch (error) {
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('errorAlert').textContent = 'Error de conexión';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Rutina';
        }
    });
</script>
{% endblock %}
