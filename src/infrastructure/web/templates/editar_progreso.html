{% extends "base.html" %}

{% block title %}Editar Medición - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-edit text-primary me-3"></i>Editar Medición de Progreso</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header bg-warning text-white">
                <h5 class="mb-0">Editando registro del <span id="fechaRegistro">...</span></h5>
            </div>
            <div class="card-body">
                <div class="text-center mb-4" id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    <p class="mt-2">Cargando datos del registro...</p>
                </div>

                <form id="formEditarProgreso" style="display: none;">
                    <input type="hidden" id="progresoId">
                    <input type="hidden" id="clienteId">
                    
                    <div class="mb-3">
                        <label class="form-label">Cliente</label>
                        <input type="text" class="form-control" id="clienteNombre" readonly>
                    </div>

                    <div class="mb-3">
                        <label for="fecha" class="form-label">Fecha de medición</label>
                        <input type="date" class="form-control" id="fecha" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="peso" class="form-label">Peso (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="peso">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="altura" class="form-label">Altura (cm)</label>
                            <input type="number" step="1" class="form-control" id="altura">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="brazos" class="form-label">Brazos (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="brazos">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="pecho" class="form-label">Pecho (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="pecho">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="cintura" class="form-label">Cintura (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="cintura">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="piernas" class="form-label">Piernas (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="piernas">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notas" class="form-label">Notas adicionales</label>
                        <textarea class="form-control" id="notas" rows="2"></textarea>
                    </div>

                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    <div class="alert alert-success d-none" id="successAlert"></div>

                    <div class="d-flex justify-content-between">
                        <a href="/progreso" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-warning" id="btnGuardar">
                            <i class="fas fa-save me-2"></i>Guardar Cambios
                        </button>
                    </div>
                </form>

                <div id="errorInfo" class="alert alert-danger d-none">
                    No se pudo cargar el registro
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const progresoId = window.location.pathname.split('/')[2];

    document.addEventListener('DOMContentLoaded', function() {
        cargarRegistro();
    });

    function cargarRegistro() {
        fetch(`/api/progreso/${progresoId}`)
            .then(response => {
                if (!response.ok) throw new Error('Registro no encontrado');
                return response.json();
            })
            .then(progreso => {
                return fetch(`/api/clientes/${progreso.cliente_id}`)
                    .then(res => res.json())
                    .then(cliente => {
                        mostrarRegistro(progreso, cliente);
                    });
            })
            .catch(error => {
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('errorInfo').classList.remove('d-none');
                document.getElementById('errorInfo').textContent = error.message;
                console.error('Error:', error);
            });
    }

    function mostrarRegistro(progreso, cliente) {
        document.getElementById('loadingSpinner').style.display = 'none';
        document.getElementById('formEditarProgreso').style.display = 'block';
        
        document.getElementById('fechaRegistro').textContent = new Date(progreso.fecha).toLocaleDateString();
        document.getElementById('progresoId').value = progreso.id;
        document.getElementById('clienteId').value = progreso.cliente_id;
        document.getElementById('clienteNombre').value = `${cliente.nombre} ${cliente.apellido}`;
        document.getElementById('fecha').value = progreso.fecha;
        document.getElementById('peso').value = progreso.peso || '';
        document.getElementById('altura').value = progreso.altura || '';
        document.getElementById('brazos').value = progreso.brazos || '';
        document.getElementById('pecho').value = progreso.pecho || '';
        document.getElementById('cintura').value = progreso.cintura || '';
        document.getElementById('piernas').value = progreso.piernas || '';
        document.getElementById('notas').value = progreso.notas || '';
    }

    document.getElementById('formEditarProgreso').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        const data = {
            cliente_id: parseInt(document.getElementById('clienteId').value),
            fecha: document.getElementById('fecha').value,
            peso: document.getElementById('peso').value ? parseFloat(document.getElementById('peso').value) : null,
            altura: document.getElementById('altura').value ? parseInt(document.getElementById('altura').value) : null,
            brazos: document.getElementById('brazos').value ? parseFloat(document.getElementById('brazos').value) : null,
            pecho: document.getElementById('pecho').value ? parseFloat(document.getElementById('pecho').value) : null,
            cintura: document.getElementById('cintura').value ? parseFloat(document.getElementById('cintura').value) : null,
            piernas: document.getElementById('piernas').value ? parseFloat(document.getElementById('piernas').value) : null,
            notas: document.getElementById('notas').value || null
        };

        try {
            const response = await fetch(`/api/progreso/${progresoId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                document.getElementById('successAlert').classList.remove('d-none');
                document.getElementById('successAlert').textContent = 'Registro actualizado exitosamente';
                setTimeout(() => window.location.href = `/progreso/cliente/${data.cliente_id}`, 2000);
            } else {
                document.getElementById('errorAlert').classList.remove('d-none');
                document.getElementById('errorAlert').textContent = result.error;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cambios';
            }
        } catch (error) {
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('errorAlert').textContent = 'Error de conexión';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cambios';
            console.error('Error:', error);
        }
    });
</script>
{% endblock %}
