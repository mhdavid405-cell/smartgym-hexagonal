{% extends "base.html" %}

{% block title %}Nuevo Registro - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-plus-circle text-primary me-3"></i>Registrar Nuevas Medidas</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Medidas del Cliente</h5>
            </div>
            <div class="card-body">
                <form id="formProgreso">
                    <div class="mb-3">
                        <label for="cliente_id" class="form-label">Cliente</label>
                        <select class="form-select" id="cliente_id" required>
                            <option value="">Seleccionar cliente...</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="peso" class="form-label">Peso (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="peso">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="altura" class="form-label">Altura (cm)</label>
                            <input type="number" step="1" class="form-control" id="altura">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="brazos" class="form-label">Brazos (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="brazos">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="pecho" class="form-label">Pecho (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="pecho">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="cintura" class="form-label">Cintura (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="cintura">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="piernas" class="form-label">Piernas (cm)</label>
                            <input type="number" step="0.1" class="form-control" id="piernas">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notas" class="form-label">Notas adicionales</label>
                        <textarea class="form-control" id="notas" rows="2"></textarea>
                    </div>

                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    <div class="alert alert-success d-none" id="successAlert"></div>

                    <div class="d-flex justify-content-between">
                        <a href="/progreso" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-2"></i>Guardar Medidas
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    fetch('/api/clientes')
        .then(response => response.json())
        .then(clientes => {
            const select = document.getElementById('cliente_id');
            clientes.forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = `${c.nombre} ${c.apellido} - ${c.dni}`;
                select.appendChild(option);
            });
        });

    document.getElementById('formProgreso').addEventListener('submit', async function(e) {
        e.preventDefault();

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';

        const data = {
            cliente_id: document.getElementById('cliente_id').value,
            peso: document.getElementById('peso').value ? parseFloat(document.getElementById('peso').value) : null,
            altura: document.getElementById('altura').value ? parseInt(document.getElementById('altura').value) : null,
            brazos: document.getElementById('brazos').value ? parseFloat(document.getElementById('brazos').value) : null,
            pecho: document.getElementById('pecho').value ? parseFloat(document.getElementById('pecho').value) : null,
            cintura: document.getElementById('cintura').value ? parseFloat(document.getElementById('cintura').value) : null,
            piernas: document.getElementById('piernas').value ? parseFloat(document.getElementById('piernas').value) : null,
            notas: document.getElementById('notas').value || null
        };

        try {
            const response = await fetch('/api/progreso', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (response.ok) {
                document.getElementById('successAlert').classList.remove('d-none');
                document.getElementById('successAlert').textContent = 'Medidas registradas exitosamente';
                setTimeout(() => window.location.href = '/progreso', 2000);
            } else {
                document.getElementById('errorAlert').classList.remove('d-none');
                document.getElementById('errorAlert').textContent = result.error;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Medidas';
            }
        } catch (error) {
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('errorAlert').textContent = 'Error de conexión';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Medidas';
        }
    });
</script>
{% endblock %}
