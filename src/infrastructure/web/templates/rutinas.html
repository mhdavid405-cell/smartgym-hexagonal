{% extends "base.html" %}

{% block title %}Rutinas - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-dumbbell text-primary me-3"></i>Rutinas de Entrenamiento</h1>
        <hr>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <button class="btn btn-primary" onclick="location.href='/rutinas/nueva'">
            <i class="fas fa-plus me-2"></i>Nueva Rutina
        </button>
    </div>
    <div class="col-md-6">
        <div class="input-group">
            <input type="text" class="form-control" id="buscarCliente" placeholder="Buscar por cliente...">
            <button class="btn btn-outline-secondary" onclick="buscarRutinas()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Todas las Rutinas</h5>
    </div>
    <div class="card-body">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Cliente</th>
                    <th>Título</th>
                    <th>Ejercicios</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaRutinas">
                <tr>
                    <td colspan="7" class="text-center">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Cargando...</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        cargarRutinas();
    });

    function cargarRutinas() {
        fetch('/api/rutinas')
            .then(response => response.json())
            .then(rutinas => {
                const tbody = document.getElementById('tablaRutinas');
                tbody.innerHTML = '';

                rutinas.forEach(r => {
                    // Obtener nombre del cliente (necesitamos otro endpoint)
                    fetch(`/api/clientes/${r.cliente_id}`)
                        .then(res => res.json())
                        .then(cliente => {
                            const row = tbody.insertRow();
                            row.innerHTML = `
                                <td>${r.id}</td>
                                <td>${cliente.nombre} ${cliente.apellido}</td>
                                <td>${r.titulo}</td>
                                <td>${r.ejercicios.substring(0, 30)}...</td>
                                <td>${new Date(r.fecha_asignacion).toLocaleDateString()}</td>
                                <td>
                                    <span class="badge ${r.activa ? 'bg-success' : 'bg-secondary'}">
                                        ${r.activa ? 'Activa' : 'Inactiva'}
                                    </span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-info" onclick="verRutina(${r.id})">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                            `;
                        });
                });
            });
    }

    function verRutina(id) {
        window.location.href = `/rutinas/${id}`;
    }
</script>
{% endblock %}
