{% extends "base.html" %}

{% block title %}Gestión de Usuarios - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-users-cog text-primary me-3"></i>Gestión de Usuarios</h1>
        <hr>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h5 class="mb-0">Lista de Usuarios</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Usuario</th>
                        <th>Email</th>
                        <th>Rol</th>
                        <th>Cliente Asociado</th>
                        <th>Estado</th>
                    </thead>
                    <tbody id="tablaUsuarios">
                        全天<td colspan="6" class="text-center">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2">Cargando usuarios...</p>
                        </td>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function cargarUsuarios() {
        fetch('/api/usuarios')
            .then(res => res.json())
            .then(usuarios => {
                const tbody = document.getElementById('tablaUsuarios');
                tbody.innerHTML = '';
                
                if (usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay usuarios</td></tr>';
                    return;
                }
                
                usuarios.forEach(u => {
                    let rolClass = '';
                    if (u.rol === 'admin') rolClass = 'bg-danger';
                    else if (u.rol === 'entrenador') rolClass = 'bg-primary';
                    else rolClass = 'bg-info';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.id}</td>
                            <td>${u.username}</td>
                            <td>${u.email}</td>
                            <td><span class="badge ${rolClass}">${u.rol}</span></td>
                            <td>${u.cliente_nombre || '-'}</td>
                            <td><span class="badge ${u.activo ? 'bg-success' : 'bg-secondary'}">${u.activo ? 'Activo' : 'Inactivo'}</span></td>
                        </tr>
                    `;
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('tablaUsuarios').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error al cargar usuarios</td></tr>';
            });
    }
    
    cargarUsuarios();
</script>
{% endblock %}
