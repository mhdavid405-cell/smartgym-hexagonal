{% extends "base.html" %}

{% block title %}Reportes - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-chart-bar text-primary me-3"></i>Reportes</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-users me-2"></i>Clientes por Membresía</h5>
            </div>
            <div class="card-body">
                <div class="text-center" id="clientesPorMembresia">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0"><i class="fas fa-dollar-sign me-2"></i>Ingresos por Mes</h5>
            </div>
            <div class="card-body">
                <div class="text-center" id="ingresosPorMes">
                    <div class="spinner-border text-primary" role="status"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Cargar clientes por membresía
    fetch('/api/clientes')
        .then(res => res.json())
        .then(clientes => {
            const membresias = {};
            clientes.forEach(c => {
                const nombre = c.membresia_nombre || 'Sin membresía';
                membresias[nombre] = (membresias[nombre] || 0) + 1;
            });
            
            let html = '<ul class="list-group">';
            for (const [nombre, total] of Object.entries(membresias)) {
                html += `<li class="list-group-item d-flex justify-content-between align-items-center">
                            ${nombre}
                            <span class="badge bg-primary rounded-pill">${total}</span>
                        </li>`;
            }
            html += '</ul>';
            document.getElementById('clientesPorMembresia').innerHTML = html;
        });
</script>
{% endblock %}
