{% extends "base.html" %}

{% block title %}Nuevo Cliente - SmartGym{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h1><i class="fas fa-user-plus text-primary me-3"></i>Registrar Nuevo Cliente</h1>
        <hr>
    </div>
</div>

<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">Datos del Cliente</h5>
            </div>
            <div class="card-body">
                <form id="formCliente">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="nombre" class="form-label">Nombre *</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="col-md-6">
                            <label for="apellido" class="form-label">Apellido *</label>
                            <input type="text" class="form-control" id="apellido" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="dni" class="form-label">DNI *</label>
                            <input type="text" class="form-control" id="dni" required>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="telefono" class="form-label">Teléfono</label>
                            <input type="text" class="form-control" id="telefono">
                        </div>
                    </div>

                    <div class="alert alert-danger d-none" id="errorAlert"></div>
                    <div class="alert alert-success d-none" id="successAlert"></div>

                    <div class="d-flex justify-content-between">
                        <a href="/clientes" class="btn btn-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancelar
                        </a>
                        <button type="submit" class="btn btn-primary" id="btnGuardar">
                            <i class="fas fa-save me-2"></i>Guardar Cliente
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('formCliente').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Ocultar alertas anteriores
        document.getElementById('errorAlert').classList.add('d-none');
        document.getElementById('successAlert').classList.add('d-none');
        
        // Deshabilitar botón
        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Guardando...';
        
        // Preparar datos
        const clienteData = {
            nombre: document.getElementById('nombre').value,
            apellido: document.getElementById('apellido').value,
            dni: document.getElementById('dni').value,
            email: document.getElementById('email').value || null,
            telefono: document.getElementById('telefono').value || null
        };
        
        try {
            const response = await fetch('/api/clientes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(clienteData)
            });
            
            const data = await response.json();
            
            if (response.ok) {
                // Mostrar éxito
                document.getElementById('successAlert').classList.remove('d-none');
                document.getElementById('successAlert').textContent = 'Cliente registrado exitosamente';
                
                // Limpiar formulario
                document.getElementById('formCliente').reset();
                
                // Redirigir después de 2 segundos
                setTimeout(() => {
                    window.location.href = '/clientes';
                }, 2000);
            } else {
                // Mostrar error
                document.getElementById('errorAlert').classList.remove('d-none');
                document.getElementById('errorAlert').textContent = data.error || 'Error al registrar cliente';
                
                // Re-habilitar botón
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cliente';
            }
        } catch (error) {
            document.getElementById('errorAlert').classList.remove('d-none');
            document.getElementById('errorAlert').textContent = 'Error de conexión';
            
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Guardar Cliente';
        }
    });
</script>
{% endblock %}
